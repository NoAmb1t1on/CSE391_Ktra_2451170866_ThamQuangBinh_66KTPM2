<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDo List</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />
  <style>
    body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }

    /* ── Card ─────────────────────────────────────────── */
    .task-card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .task-card .card-header {
      background: #fff; border-bottom: 1px solid #eee;
      border-radius: 14px 14px 0 0 !important; padding: 1rem 1.25rem;
    }

    /* ── Task rows ──────────────────────────────────────── */
    .task-row { padding: .85rem 1.25rem; border-bottom: 1px solid #f2f2f2; }
    .task-row:last-child { border-bottom: none; }
    .col-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
    .task-name { font-size: 14px; font-weight: 600; color: #222; }
    .priority-high   { color: #dc3545; font-weight: 700; font-size: 13px; }
    .priority-medium { color: #fd7e14; font-weight: 700; font-size: 13px; }
    .priority-low    { color: #28a745; font-weight: 700; font-size: 13px; }

    /* ── Status badges ──────────────────────────────────── */
    .status-badge {
      display: inline-block; font-size: 11px; padding: 3px 11px;
      border-radius: 20px; border: 1.5px solid;
    }
    .status-todo    { border-color: #aaa;  color: #555;  background: #f7f7f7; }
    .status-done    { border-color: #28a745; color: #28a745; background: #eafff0; }
    .status-progress{ border-color: #6c757d; color: #6c757d; background: #f0f0f0; }

    /* ── Action icons ───────────────────────────────────── */
    .icon-btn { border: none; background: none; padding: 4px 7px; border-radius: 6px; cursor: pointer; font-size: 15px; }
    .icon-btn-edit  { color: #555; } .icon-btn-edit:hover  { background: #f0f0f0; }
    .icon-btn-del   { color: #dc3545; } .icon-btn-del:hover  { background: #ffeaea; }

    /* ── Add Task button ────────────────────────────────── */
    .btn-add-top {
      background: linear-gradient(135deg,#667eea,#764ba2);
      color:#fff; border:none; border-radius:8px;
      padding:7px 15px; font-size:13px; font-weight:600;
    }
    .btn-add-top:hover { opacity:.9; color:#fff; }

    /* ── Modal ──────────────────────────────────────────── */
    .modal-content { border: none; border-radius: 14px; }
    .modal-header  { border-bottom: 1px solid #eee; padding: 1rem 1.25rem; }
    .modal-title   { font-size: 15px; font-weight: 700; }

    /* ── Priority radio pills ───────────────────────────── */
    .priority-group .btn-check + .btn {
      border-radius: 20px; font-size: 13px; padding: 5px 18px;
    }
    .btn-check:checked + .btn-outline-danger  { background: #dc3545; color:#fff; }
    .btn-check:checked + .btn-outline-warning { background: #fd7e14; color:#fff; }
    .btn-check:checked + .btn-outline-success { background: #28a745; color:#fff; }

    /* ── Submit button ──────────────────────────────────── */
    .btn-submit {
      background: linear-gradient(135deg,#667eea,#764ba2);
      color:#fff; border:none; border-radius:8px;
      padding:7px 22px; font-size:14px; font-weight:600;
    }
    .btn-submit:hover { opacity:.9; color:#fff; }

    /* ── Validation ─────────────────────────────────────── */
    .char-hint { font-size: 11px; color: #aaa; text-align: right; }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">

      <!-- ─── Task List Card ─────────────────────────────── -->
      <div class="card task-card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h5 class="mb-0 fw-bold">Task List</h5>
          <button class="btn-add-top" data-bs-toggle="modal" data-bs-target="#addModal">
            + Add Task
          </button>
        </div>

        <div id="taskListBody">
          <!-- Rows injected by JS -->
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ─── Add / Edit Task Modal ──────────────────────────── -->
<div class="modal fade" id="addModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h6 class="modal-title" id="modalTitle">Add Task</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body px-4 pb-4 pt-3">
        <!-- Task input -->
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:13px;">Task</label>
          <input
            type="text" id="taskInput" maxlength="100"
            class="form-control form-control-sm"
            placeholder="Type your task here..."
            oninput="updateChar()"
          />
          <div class="d-flex justify-content-between mt-1">
            <small class="text-danger d-none" id="taskError">Task name cannot be empty.</small>
            <span></span>
            <span class="char-hint"><span id="charCount">0</span>/100</span>
          </div>
        </div>

        <!-- Priority -->
        <div class="mb-4">
          <label class="form-label fw-semibold d-block" style="font-size:13px;">Priority</label>
          <div class="priority-group btn-group" role="group">
            <input type="radio" class="btn-check" name="priority" id="pHigh" value="High" checked>
            <label class="btn btn-outline-danger btn-sm" for="pHigh">High</label>

            <input type="radio" class="btn-check" name="priority" id="pMedium" value="Medium">
            <label class="btn btn-outline-warning btn-sm" for="pMedium">Medium</label>

            <input type="radio" class="btn-check" name="priority" id="pLow" value="Low">
            <label class="btn btn-outline-success btn-sm" for="pLow">Low</label>
          </div>
        </div>

        <div class="text-end">
          <button class="btn-submit" onclick="submitTask()">Add</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ── State ──────────────────────────────────────────────── */
let tasks = [];
let editingId = null;
const modal = () => bootstrap.Modal.getOrCreateInstance(document.getElementById('addModal'));

/* ── Fetch initial data ─────────────────────────────────── */
fetch('data.json')
  .then(r => r.json())
  .then(data => { tasks = data; render(); })
  .catch(() => {
    // Fallback if file not served
    tasks = [
      { id:1, taskName:'Go to gym',    priority:'High',   status:'To Do'       },
      { id:2, taskName:'Read a book',  priority:'Low',    status:'Done'        },
      { id:3, taskName:'Go to market', priority:'Medium', status:'In Progress' },
    ];
    render();
  });

/* ── o5                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            Render */
function render() {
  const body = document.getElementById('taskListBody');
  if (!tasks.length) {
    body.innerHTML = '<p class="text-center text-muted py-4" style="font-size:13px;">No tasks yet.</p>';
    return;
  }
  body.innerHTML = tasks.map(t => `
    <div class="task-row d-flex align-items-center gap-2">
      <div style="flex:1;min-width:0">
        <div class="col-label">Task</div>
        <div class="task-name">${escHtml(t.taskName)}</div>
      </div>
      <div style="width:90px;flex-shrink:0">
        <div class="col-label">Priority</div>
        <span class="priority-${t.priority.toLowerCase()}">${t.priority}</span>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="status-badge ${statusClass(t.status)}">${t.status}</span>
        <button class="icon-btn icon-btn-edit" onclick="openEdit(${t.id})" title="Edit">✏️</button>
        <button class="icon-btn icon-btn-del"  onclick="deleteTask(${t.id})" title="Delete">🗑️</button>
      </div>
    </div>
  `).join('');
}

function statusClass(s) {
  if (s === 'Done')        return 'status-done';
  if (s === 'In Progress') return 'status-progress';
  return 'status-todo';
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Char counter ───────────────────────────────────────── */
function updateChar() {
  const v = document.getElementById('taskInput').value;
  document.getElementById('charCount').textContent = v.length;
}

/* ── Open Add modal ─────────────────────────────────────── */
document.getElementById('addModal').addEventListener('show.bs.modal', () => {
  if (editingId === null) {
    document.getElementById('modalTitle').textContent = 'Add Task';
    document.getElementById('taskInput').value = '';
    document.getElementById('charCount').textContent = '0';
    document.querySelector('[name=priority][value=High]').checked = true;
    document.querySelector('.btn-submit').textContent = 'Add';
  }
  document.getElementById('taskError').classList.add('d-none');
  document.getElementById('taskInput').classList.remove('is-invalid');
});
document.getElementById('addModal').addEventListener('hidden.bs.modal', () => { editingId = null; });

/* ── Submit ─────────────────────────────────────────────── */
function submitTask() {
  const input = document.getElementById('taskInput');
  const name  = input.value.trim();
  const errEl = document.getElementById('taskError');

  // Validation
  if (!name) {
    errEl.textContent = 'Task name cannot be empty.';
    errEl.classList.remove('d-none');
    input.classList.add('is-invalid');
    return;
  }
  if (name.length > 100) {
    errEl.textContent = 'Task name must not exceed 100 characters.';
    errEl.classList.remove('d-none');
    input.classList.add('is-invalid');
    return;
  }
  errEl.classList.add('d-none');
  input.classList.remove('is-invalid');

  const priority = document.querySelector('[name=priority]:checked').value;

  if (editingId !== null) {
    tasks = tasks.map(t => t.id === editingId ? { ...t, taskName: name, priority } : t);
  } else {
    tasks.push({ id: Date.now(), taskName: name, priority, status: 'To Do' });
  }

  modal().hide();
  render();
}

/* ── Edit ───────────────────────────────────────────────── */
function openEdit(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('taskInput').value = t.taskName;
  document.getElementById('charCount').textContent = t.taskName.length;
  document.querySelector(`[name=priority][value=${t.priority}]`).checked = true;
  document.querySelector('.btn-submit').textContent = 'Save';
  modal().show();
}

/* ── Delete ─────────────────────────────────────────────── */
function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  render();
}
</script>
</body>
</html>
